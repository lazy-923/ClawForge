services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - backend/.env
    ports:
      - "8002:8002"
    volumes:
      - ./backend/memory:/app/backend/memory
      - ./backend/sessions:/app/backend/sessions
      - ./backend/skills:/app/backend/skills
      - ./backend/skill_drafts:/app/backend/skill_drafts
      - ./backend/skill_registry:/app/backend/skill_registry
      - ./backend/storage:/app/backend/storage
      - ./backend/knowledge:/app/backend/knowledge
      - ./backend/workspace:/app/backend/workspace
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8002/api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8002/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
